<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Ozan Ramazan Kalkan</title>
    <meta http-equiv="refresh" content="4;url=/#contact">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .thanks-card {
            text-align: center;
            max-width: 560px;
            padding: 3rem 2.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }
        .thanks-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            color: #00cec9;
        }
        .thanks-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .thanks-desc {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .thanks-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #6c5ce7;
            text-decoration: none;
            font-weight: 600;
        }
        .thanks-back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="thanks-card">
        <svg class="thanks-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h1 class="thanks-title">Message sent</h1>
        <p class="thanks-desc">
            Thanks for reaching out. I'll get back to you as soon as possible.
            Redirecting you back to the site in a few seconds...
        </p>
        <a href="/" class="thanks-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to home
        </a>
    </div>
    <script src="script.js"></script>
</body>
</html>
