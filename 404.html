<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    if (path.startsWith('/testforge/') && path !== '/testforge/') {
      var sub = path.slice('/testforge'.length);
      window.location.replace('/testforge/?p=' + encodeURIComponent(sub) + window.location.hash);
    }
  </script>
</head>
<body></body>
</html>
