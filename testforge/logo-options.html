<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Options — All Versions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", sans-serif; background: linear-gradient(to right, #dfe0e8, #ECEDF5); min-height: 100vh; padding: 40px; }
h1 { text-align: center; font-size: 18px; font-weight: 700; color: #1c1c1e; margin-bottom: 8px; }
.subtitle { text-align: center; font-size: 13px; color: #8e8e93; margin-bottom: 40px; }
.grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; }
.option { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-size: 12px; font-weight: 700; color: #6e6897; text-transform: uppercase; letter-spacing: .08em; }
.logo-box { width: 88px; height: 88px; border-radius: 22px; display: flex; align-items: center; justify-content: center; }
.preview { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(255,255,255,0.5); border-radius: 14px; border: 0.5px solid rgba(255,255,255,0.7); }
.app-name { font-size: 18px; font-weight: 700; color: #1c1c1e; letter-spacing: -.03em; }
.app-sub { font-size: 10px; color: #8e8e93; margin-top: 2px; }
.small-logo { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.divider { width: 100%; height: 1px; background: rgba(99,102,241,0.1); margin: 30px 0; }
.section { font-size: 14px; font-weight: 700; color: #4f46e5; text-align: center; margin-bottom: 24px; }
</style>
</head>
<body>

<h1>Fira Logo — All Versions</h1>
<div class="subtitle">Her versiyon buyuk + sidebar preview olarak gosteriliyor</div>

<div class="divider"></div>
<div class="section">V1 — Original (Mevcut)</div>
<div class="grid">
  <div class="option">
    <div class="label">Current</div>
    <div class="logo-box" style="background:#f0f0f5;border:1px solid #e5e5ea;">
      <svg width="52" height="52" viewBox="0 0 100 100">
        <rect x="6" y="6" width="34" height="34" rx="8" fill="#7c6bc4"/>
        <rect x="44" y="6" width="20" height="34" rx="6" fill="#93b5f7"/>
        <rect x="68" y="6" width="26" height="34" rx="6" fill="#a78bfa"/>
        <rect x="6" y="44" width="34" height="20" rx="6" fill="#8b5cf6"/>
        <rect x="6" y="68" width="34" height="26" rx="6" fill="#6366f1"/>
      </svg>
    </div>
    <div class="preview">
      <div class="small-logo" style="background:#f0f0f5;border:1px solid #e5e5ea;">
        <svg width="26" height="26" viewBox="0 0 100 100">
          <rect x="6" y="6" width="34" height="34" rx="8" fill="#7c6bc4"/>
          <rect x="44" y="6" width="20" height="34" rx="6" fill="#93b5f7"/>
          <rect x="68" y="6" width="26" height="34" rx="6" fill="#a78bfa"/>
          <rect x="6" y="44" width="34" height="20" rx="6" fill="#8b5cf6"/>
          <rect x="6" y="68" width="34" height="26" rx="6" fill="#6366f1"/>
        </svg>
      </div>
      <div><div class="app-name">Fira</div><div class="app-sub">SAP UI5 Test Automation</div></div>
    </div>
  </div>
</div>

<div class="divider"></div>
<div class="section">V2 — Block F (Genis Bosluklu)</div>
<div class="grid">

  <div class="option">
    <div class="label">V2-A Grid</div>
    <div class="logo-box" style="background:#f0f0f5;border:1px solid #e5e5ea;">
      <svg width="52" height="52" viewBox="0 0 100 100">
        <rect x="4" y="4" width="24" height="24" rx="5" fill="#4f46e5"/>
        <rect x="38" y="4" width="24" height="24" rx="5" fill="#6366f1"/>
        <rect x="72" y="4" width="24" height="24" rx="5" fill="#a78bfa"/>
        <rect x="4" y="38" width="24" height="24" rx="5" fill="#6366f1"/>
        <rect x="38" y="38" width="24" height="24" rx="5" fill="#8b5cf6"/>
        <rect x="4" y="72" width="24" height="24" rx="5" fill="#8b5cf6"/>
      </svg>
    </div>
    <div class="preview">
      <div class="small-logo" style="background:#f0f0f5;border:1px solid #e5e5ea;">
        <svg width="26" height="26" viewBox="0 0 100 100">
          <rect x="4" y="4" width="24" height="24" rx="5" fill="#4f46e5"/>
          <rect x="38" y="4" width="24" height="24" rx="5" fill="#6366f1"/>
          <rect x="72" y="4" width="24" height="24" rx="5" fill="#a78bfa"/>
          <rect x="4" y="38" width="24" height="24" rx="5" fill="#6366f1"/>
          <rect x="38" y="38" width="24" height="24" rx="5" fill="#8b5cf6"/>
          <rect x="4" y="72" width="24" height="24" rx="5" fill="#8b5cf6"/>
        </svg>
      </div>
      <div><div class="app-name">Fira</div><div class="app-sub">SAP UI5 Test Automation</div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">V2-B Minimal</div>
    <div class="logo-box" style="background:#f0f0f5;border:1px solid #e5e5ea;">
      <svg width="52" height="52" viewBox="0 0 100 100">
        <rect x="4" y="4" width="26" height="92" rx="6" fill="#4f46e5"/>
        <rect x="38" y="4" width="58" height="22" rx="6" fill="#818cf8"/>
        <rect x="38" y="34" width="38" height="20" rx="6" fill="#a78bfa"/>
      </svg>
    </div>
    <div class="preview">
      <div class="small-logo" style="background:#f0f0f5;border:1px solid #e5e5ea;">
        <svg width="26" height="26" viewBox="0 0 100 100">
          <rect x="4" y="4" width="26" height="92" rx="6" fill="#4f46e5"/>
          <rect x="38" y="4" width="58" height="22" rx="6" fill="#818cf8"/>
          <rect x="38" y="34" width="38" height="20" rx="6" fill="#a78bfa"/>
        </svg>
      </div>
      <div><div class="app-name">Fira</div><div class="app-sub">SAP UI5 Test Automation</div></div>
    </div>
  </div>

  <div class="option">
    <div class="label">V2-C Mixed</div>
    <div class="logo-box" style="background:#f0f0f5;border:1px solid #e5e5ea;">
      <svg width="52" height="52" viewBox="0 0 100 100">
        <rect x="4" y="4" width="28" height="28" rx="7" fill="#4f46e5"/>
        <rect x="40" y="4" width="20" height="28" rx="6" fill="#7c6bc4"/>
        <rect x="68" y="4" width="28" height="28" rx="7" fill="#a78bfa"/>
        <rect x="4" y="40" width="28" height="20" rx="6" fill="#6366f1"/>
        <rect x="40" y="40" width="28" height="20" rx="6" fill="#93b5f7"/>
        <rect x="4" y="68" width="28" height="28" rx="7" fill="#8b5cf6"/>
      </svg>
    </div>
    <div class="preview">
      <div class="small-logo" style="background:#f0f0f5;border:1px solid #e5e5ea;">
        <svg width="26" height="26" viewBox="0 0 100 100">
          <rect x="4" y="4" width="28" height="28" rx="7" fill="#4f46e5"/>
          <rect x="40" y="4" width="20" height="28" rx="6" fill="#7c6bc4"/>
          <rect x="68" y="4" width="28" height="28" rx="7" fill="#a78bfa"/>
          <rect x="4" y="40" width="28" height="20" rx="6" fill="#6366f1"/>
          <rect x="40" y="40" width="28" height="20" rx="6" fill="#93b5f7"/>
          <rect x="4" y="68" width="28" height="28" rx="7" fill="#8b5cf6"/>
        </svg>
      </div>
      <div><div class="app-name">Fira</div><div class="app-sub">SAP UI5 Test Automation</div></div>
    </div>
  </div>

</div>

</body>
</html>
